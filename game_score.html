<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trivia Master - GK Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 20px; margin: 0; }
        .quiz-card { background: #1e293b; border-radius: 24px; padding: 30px; max-width: 600px; margin: 30px auto; border: 2px solid #10b981; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .option-btn { background: #334155; color: white; border: 1px solid #475569; padding: 15px; border-radius: 12px; cursor: pointer; margin: 10px; width: 100%; font-size: 1rem; transition: 0.3s; text-align: left; }
        .option-btn:hover { background: #475569; transform: translateX(5px); }
        .correct { background: #10b981 !important; border-color: #059669; }
        .wrong { background: #ef4444 !important; border-color: #b91c1c; }
        .progress-bar { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #10b981; width: 0%; transition: 0.5s; border-radius: 5px; }
        .score-box { font-size: 1.2rem; font-weight: bold; color: #fbbf24; margin: 20px 0; }
        .badge-section { display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; }
        .badge { opacity: 0.3; filter: grayscale(1); transition: 0.5s; }
        .badge.active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
    </style>
</head>
<body>
    <h1>🧠 AI Trivia Master</h1>
    <p>Test your General Knowledge & AI Basics!</p>

    <div class="quiz-card" id="quiz-container">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <h3 id="question-text">Loading Question...</h3>
        <div id="options-container"></div>
        <div id="feedback" style="margin-top: 15px; font-weight: bold;"></div>
    </div>

    <div class="quiz-card" id="result-card" style="display: none;">
        <h2>Quiz Completed! 🎉</h2>
        <p class="score-box">Your Score: <span id="final-score">0</span> XP</p>
        <div class="badge-section">
            <div id="badge-1" class="badge">🥇<br><small>Quizzer</small></div>
            <div id="badge-2" class="badge">🎓<br><small>Scholar</small></div>
            <div id="badge-3" class="badge">🔥<br><small>Grandmaster</small></div>
        </div>
        <button onclick="location.reload()" style="background:#10b981; color:white; border:none; padding:15px 30px; border-radius:12px; cursor:pointer; margin-top:20px; font-weight:bold;">Try Again</button>
    </div>

    <script>
        const quizData = [
            { q: "Who is known as the Father of Artificial Intelligence?", a: "John McCarthy", o: ["Elon Musk", "John McCarthy", "Alan Turing", "Bill Gates"] },
            { q: "Which planet is known as the Red Planet?", a: "Mars", o: ["Venus", "Mars", "Jupiter", "Saturn"] },
            { q: "What does 'NLP' stand for in AI?", a: "Natural Language Processing", o: ["Natural Logic Program", "Network Link Process", "Natural Language Processing", "Node Level Protocol"] },
            { q: "Which is the largest ocean on Earth?", a: "Pacific Ocean", o: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"] },
            { q: "What is the brain of a computer?", a: "CPU", o: ["RAM", "GPU", "CPU", "Hard Disk"] }
        ];

        let currentIdx = 0;
        let score = 0;

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('question-text').innerText = `Q${currentIdx+1}: ${q.q}`;
            const optionsBox = document.getElementById('options-container');
            optionsBox.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            
            q.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt);
                optionsBox.appendChild(btn);
            });

            document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;
        }

        function checkAnswer(btn, choice) {
            const correct = quizData[currentIdx].a;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (choice === correct) {
                btn.classList.add('correct');
                score += 20;
                document.getElementById('feedback').innerText = "✅ Correct! +20 XP";
                document.getElementById('feedback').style.color = "#10b981";
            } else {
                btn.classList.add('wrong');
                document.getElementById('feedback').innerText = `❌ Wrong! Correct: ${correct}`;
                document.getElementById('feedback').style.color = "#ef4444";
            }

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('final-score').innerText = score;

            // Badge Logic
            if (score >= 40) document.getElementById('badge-1').classList.add('active');
            if (score >= 80) document.getElementById('badge-2').classList.add('active');
            if (score === 100) document.getElementById('badge-3').classList.add('active');

            // Save XP to local storage (Gamification)
            let totalXP = parseInt(localStorage.getItem('v_xp')) || 0;
            localStorage.setItem('v_xp', totalXP + score);
        }

        loadQuestion();
    </script>
</body>
</html>
