
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful GK Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(90deg, #ff7eb3, #7afcff);
      padding: 20px;
      color: #111827;
    }
    .header h1 {
      margin: 0;
      font-size: 32px;
    }
    .header p {
      margin: 8px 0 0;
    }
    .content {
      padding: 24px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .pill {
      background: #eef2ff;
      color: #4338ca;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: bold;
    }
    .question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
    }
    .option {
      display: block;
      margin: 10px 0;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
      background: #fff;
    }
    .option:hover {
      border-color: #7c3aed;
      background: #f3e8ff;
    }
    .option.selected {
      border-color: #7c3aed;
      background: #f3e8ff;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #e5e7eb;
      font-size: 15px;
      resize: vertical;
    }
    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }
    .primary {
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .feedback {
      margin-top: 18px;
      min-height: 28px;
      font-weight: bold;
      font-size: 17px;
    }
    .bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }
    .bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #06b6d4);
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Colorful GK Quiz</h1>
      <p>Interactive quiz with instant feedback</p>
    </div>
    <div class="content">
      <div class="top">
        <div class="pill" id="progress">Question 1 / 5</div>
        <div class="pill" id="score">Score: 0</div>
      </div>
      <div class="bar"><div id="barFill"></div></div>
      <div id="quizArea"></div>
      <div class="feedback" id="feedback"></div>
      <div class="buttons" id="buttons"></div>
    </div>
  </div>

  <script>
    const quiz = [
      {
        type: "mcq",
        question: "Which is the capital of India?",
        options: ["Mumbai", "New Delhi", "Kolkata", "Chennai"],
        answer: "New Delhi"
      },
      {
        type: "mcq",
        question: "Which planet is known as the Red Planet?",
        options: ["Earth", "Venus", "Mars", "Jupiter"],
        answer: "Mars"
      },
      {
        type: "mcq",
        question: "How many continents are there in the world?",
        options: ["5", "6", "7", "8"],
        answer: "7"
      },
      {
        type: "logic",
        question: "What is the next number in the series: 2, 4, 6, 8, ?",
        answer: "10"
      },
      {
        type: "logic",
        question: "What do we call a person who studies the weather?",
        answer: "meteorologist"
      }
    ];

    let current = 0;
    let score = 0;
    let selected = "";

    const quizArea = document.getElementById("quizArea");
    const feedback = document.getElementById("feedback");
    const buttons = document.getElementById("buttons");
    const scoreEl = document.getElementById("score");
    const progressEl = document.getElementById("progress");
    const barFill = document.getElementById("barFill");

    function renderQuestion() {
      const q = quiz[current];
      selected = "";
      feedback.textContent = "";
      buttons.innerHTML = "";
      progressEl.textContent = `Question ${current + 1} / ${quiz.length}`;
      scoreEl.textContent = `Score: ${score}`;
      barFill.style.width = `${(current / quiz.length) * 100}%`;

      if (q.type === "mcq") {
        quizArea.innerHTML = `
          <div class="question">${q.question}</div>
          <div id="options"></div>
        `;
        const optionsDiv = document.getElementById("options");
        q.options.forEach(opt => {
          const div = document.createElement("div");
          div.className = "option";
          div.textContent = opt;
          div.onclick = () => {
            document.querySelectorAll(".option").forEach(x => x.classList.remove("selected"));
            div.classList.add("selected");
            selected = opt;
          };
          optionsDiv.appendChild(div);
        });
      } else {
        quizArea.innerHTML = `
          <div class="question">${q.question}</div>
          <textarea id="answerBox" placeholder="Type your answer here..."></textarea>
          <p style="color:#6b7280;">Tip: spelling sahi likhna.</p>
        `;
      }

      buttons.innerHTML = `
        <button class="primary" onclick="checkAnswer()">Submit</button>
        ${current > 0 ? '<button class="secondary" onclick="prevQuestion()">Previous</button>' : ''}
      `;
    }

    function checkAnswer() {
      const q = quiz[current];
      let userAns = "";

      if (q.type === "mcq") {
        userAns = selected;
        if (!userAns) {
          feedback.innerHTML = '<span style="color:#b45309;">Please select an option first.</span>';
          return;
        }
      } else {
        userAns = document.getElementById("answerBox").value.trim();
        if (!userAns) {
          feedback.innerHTML = '<span style="color:#b45309;">Please type an answer first.</span>';
          return;
        }
      }

      const correct = q.type === "mcq"
        ? userAns === q.answer
        : userAns.toLowerCase() === q.answer.toLowerCase();

      if (correct) {
        score++;
        feedback.innerHTML = '<span style="color:#16a34a;">✅ Correct!</span>';
      } else {
        feedback.innerHTML = `<span style="color:#dc2626;">❌ Wrong! Correct answer: ${q.answer}</span>`;
      }

      scoreEl.textContent = `Score: ${score}`;
      setTimeout(() => {
        current++;
        if (current < quiz.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }, 1200);
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        renderQuestion();
      }
    }

    function showResult() {
      progressEl.textContent = "Finished";
      barFill.style.width = "100%";
      quizArea.innerHTML = `
        <div style="text-align:center;padding:20px 0;">
          <h2 style="font-size:30px;margin:0 0 10px;">Final Score: ${score} / ${quiz.length}</h2>
          <p style="color:#4b5563;">You completed the quiz successfully.</p>
        </div>
      `;
      buttons.innerHTML = `<button class="primary" onclick="restartQuiz()">Play Again</button>`;
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
